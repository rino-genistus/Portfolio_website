<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ground: #0a0a0b;
        --ink: #f3efe7;
        --muted: #9a978d;
        --dim: #5d5a53;
        --line: rgba(245, 240, 230, 0.1);
        --accent: #d8fb52;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        position: relative;
        overflow: hidden;
        background: var(--ground);
        color: var(--ink);
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 64px 72px;
        -webkit-font-smoothing: antialiased;
      }
      /* faint baseline grid, masked toward the top — mirrors the site */
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 88px 88px;
        -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, #000 35%, transparent 100%);
        opacity: 0.5;
      }
      /* single soft accent wash, top-right */
      .wash {
        position: absolute;
        top: -180px;
        right: -160px;
        width: 620px;
        height: 620px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--accent) 16%, transparent);
        filter: blur(150px);
      }
      .row {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .mono {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .dim { color: var(--dim); letter-spacing: 0.2em; }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        margin-right: 14px;
        vertical-align: middle;
      }
      .center { position: relative; }
      .eyebrow { margin-bottom: 26px; color: var(--accent); }
      .name {
        font-family: 'Fraunces', serif;
        font-weight: 400;
        font-size: 116px;
        line-height: 0.9;
        letter-spacing: -0.02em;
      }
      .name .last { font-style: italic; color: var(--muted); }
      .name .period { color: var(--accent); }
      .sub {
        margin-top: 28px;
        font-size: 26px;
        line-height: 1.4;
        color: var(--muted);
        max-width: 760px;
      }
      .sub b { color: var(--ink); font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="wash"></div>

    <div class="row">
      <span class="mono"><span class="dot"></span>Portfolio</span>
      <span class="mono dim">AI / ML &middot; Data Science</span>
    </div>

    <div class="center">
      <div class="mono eyebrow">Rutgers University &mdash; New Brunswick</div>
      <div class="name">Rino <span class="last">Genistus</span> Ruban<span class="period">.</span></div>
      <div class="sub">
        Building <b>Neural Networks</b>, <b>LLMs</b>, and <b>AI tools</b> &mdash;
        driven by curiosity for how intelligence works.
      </div>
    </div>

    <div class="row">
      <span class="mono dim">ruban.soundrapandyan@gmail.com</span>
      <span class="mono dim">Available &mdash; Summer 2026</span>
    </div>
  </body>
</html>
